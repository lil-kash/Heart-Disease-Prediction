<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <h1>CardioSense Air</h1>
            </div>
            <p>Advanced Machine Learning Heart Disease Detection</p>
        </header>

        <main>
            <div class="form-container glass-panel">
                <h2>Patient Diagnostics</h2>
                <form id="prediction-form">
                    <div class="form-grid">
                        <div class="input-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" name="age" step="1" required min="1" max="120" placeholder="e.g. 45">
                        </div>

                        <div class="input-group">
                            <label for="sex">Sex</label>
                            <select id="sex" name="sex" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">Male</option>
                                <option value="0">Female</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="cp">Chest Pain Type (0-3)</label>
                            <select id="cp" name="cp" required>
                                <option value="" disabled selected>Select</option>
                                <option value="0">0: Typical Angina</option>
                                <option value="1">1: Atypical Angina</option>
                                <option value="2">2: Non-anginal Pain</option>
                                <option value="3">3: Asymptomatic</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="trestbps">Resting Blood Pressure (mm Hg)</label>
                            <input type="number" id="trestbps" name="trestbps" required placeholder="e.g. 120">
                        </div>

                        <div class="input-group">
                            <label for="chol">Serum Cholestoral (mg/dl)</label>
                            <input type="number" id="chol" name="chol" required placeholder="e.g. 200">
                        </div>

                        <div class="input-group">
                            <label for="fbs">Fasting Blood Sugar > 120 mg/dl</label>
                            <select id="fbs" name="fbs" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1: Yes</option>
                                <option value="0">0: No</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="restecg">Resting ECG Results (0-2)</label>
                            <select id="restecg" name="restecg" required>
                                <option value="" disabled selected>Select</option>
                                <option value="0">0: Normal</option>
                                <option value="1">1: ST-T Wave Abnormality</option>
                                <option value="2">2: Probable/Definite LVH</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="thalach">Max Heart Rate Achieved</label>
                            <input type="number" id="thalach" name="thalach" required placeholder="e.g. 150">
                        </div>

                        <div class="input-group">
                            <label for="exang">Exercise Induced Angina</label>
                            <select id="exang" name="exang" required>
                                <option value="" disabled selected>Select</option>
                                <option value="1">1: Yes</option>
                                <option value="0">0: No</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="oldpeak">ST Depression (Oldpeak)</label>
                            <input type="number" id="oldpeak" name="oldpeak" step="0.1" required placeholder="e.g. 1.0">
                        </div>

                        <div class="input-group">
                            <label for="slope">Slope of Peak Exercise ST Segment (0-2)</label>
                            <select id="slope" name="slope" required>
                                <option value="" disabled selected>Select</option>
                                <option value="0">0: Upsloping</option>
                                <option value="1">1: Flat</option>
                                <option value="2">2: Downsloping</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="ca">Number of Major Vessels (0-3)</label>
                            <select id="ca" name="ca" required>
                                <option value="" disabled selected>Select</option>
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="thal">Thalassemia (0-3)</label>
                            <select id="thal" name="thal" required>
                                <option value="" disabled selected>Select</option>
                                <option value="0">0: Normal</option>
                                <option value="1">1: Fixed Defect</option>
                                <option value="2">2: Reversable Defect</option>
                                <option value="3">3: Other</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="predict-btn">
                        <span>Analyze Patient Data</span>
                        <i class="fa-solid fa-microchip"></i>
                    </button>
                    
                    <div id="loading" class="hidden">
                        <div class="spinner"></div>
                        <span>Running ML Inference...</span>
                    </div>
                </form>
            </div>

            <div class="results-container glass-panel hidden" id="results-panel">
                <h2>Analysis Results</h2>
                
                <div class="result-card">
                    <div class="risk-badge" id="risk-badge">
                        <!-- Dynamic Risk Level -->
                    </div>
                    
                    <div class="prediction-text" id="prediction-text">
                        <!-- Dynamic Prediction -->
                    </div>
                    
                    <div class="probability-container">
                        <div class="prob-header">
                            <span>Disease Probability</span>
                            <span id="prob-percentage">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="prob-fill"></div>
                        </div>
                    </div>

                    <div class="metrics-grid">
                        <div class="metric">
                            <i class="fa-solid fa-bullseye"></i>
                            <div class="metric-info">
                                <span>Model Accuracy</span>
                                <strong>88.52%</strong>
                            </div>
                        </div>
                        <div class="metric">
                            <i class="fa-solid fa-chart-line"></i>
                            <div class="metric-info">
                                <span>ROC-AUC Score</span>
                                <strong>0.93</strong>
                            </div>
                        </div>
                    </div>

                    <button class="reset-btn" id="reset-btn">
                        <i class="fa-solid fa-rotate-right"></i>
                        New Analysis
                    </button>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Powered by Random Forest Engine</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
